name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Go バージョンは go.mod の go ディレクティブに合わせる (単一版)。
          go-version-file: go.mod

      - name: gofmt (未整形があれば失敗)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt されていないファイルがあります:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

      # serve のフロントエンド JS (webassets/) の単体テスト。lockfile 固定で入れるので、
      # ローカルで min-release-age を満たして選定・固定した版がそのまま再現される。
      - name: pnpm セットアップ
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: webassets/pnpm-lock.yaml

      - name: JS 依存インストール (frozen)
        run: pnpm install --frozen-lockfile
        working-directory: webassets

      - name: JS テスト (vitest)
        run: pnpm test
        working-directory: webassets
