# agent-tasks の herdr プラグイン。
#
# このリポジトリ (agent-tasks) 自身がプラグイン root になる。herdr へは
#   herdr plugin link <このリポジトリのパス>
# で導入する。manifest はプラグイン root 直下 (= go.mod と同じ階層) に置く決まり。
#
# 提供機能:
#   - worktime 記録 (event hook) … pane の agent 状態遷移を worktime ログに追記する (0114)。
#     これで実稼働時間の記録源が herdr に一本化され、Claude 固有の session-hook が不要になる。
#   - tui overlay (pane) … `agent-tasks tui` を herdr の overlay pane で開く (0117)。tmux の
#     display-popup 相当。1 つのプラグインに worktime 記録と tui popup を同居させ、導入
#     (plugin link) を 1 回で済ませる。
#
# command が呼ぶ agent-tasks は PATH 上の agent-tasks (herdr 版が本採用)。
id = "agent-tasks"
name = "agent-tasks"
version = "0.1.0"
min_herdr_version = "0.7.0"

# pane の agent 状態が変わるたびに短命コマンドとして起動される。イベント JSON は
# env HERDR_PLUGIN_EVENT_JSON で渡る (pane_id / agent_status を含むが session_id は含まない)。
[[events]]
on = "pane.agent_status_changed"
command = ["agent-tasks", "worktime-record"]

# tui を overlay pane で開くエントリポイント (0117)。overlay = アクティブ pane の上に一時的な
# zoomed 表示で開き、閉じると元の focus/zoom に戻る (tmux display-popup 相当)。
# 手動起動: herdr plugin pane open --plugin agent-tasks --entrypoint tui
[[panes]]
id = "tui"
title = "agent-tasks"
placement = "overlay"
command = ["agent-tasks", "tui"]

# 上記 overlay pane を開く action。キー一発で開けるようにするための間接層:
# herdr の custom keybinding (`[[keys.command]]`) は plugin の *pane* を直接開けず、
# 開けるのは *action* だけ (type="plugin_action")。そこで pane を開く action を用意する。
# config.toml に次を足すとキー割り当てになる (README / docs の手順参照):
#   [[keys.command]]
#   key = "prefix+a"
#   type = "plugin_action"
#   command = "agent-tasks.open-tui"
#   description = "agent-tasks tui (overlay)"
#
# command は `agent-tasks tui-overlay` を経由する (0124)。これが action コンテキスト
# (env HERDR_PLUGIN_CONTEXT_JSON) の focused_pane_cwd を読み、`herdr plugin pane open … --cwd
# <アクティブ pane の cwd>` を実行する。→ overlay の tui が「今見ている pane のプロジェクト」を
# 初期表示する。`herdr plugin pane open …` を直接指定すると cwd を渡せず、常にプラグイン root の
# project になってしまうため、この薄いラッパーを挟む。
[[actions]]
id = "open-tui"
title = "agent-tasks tui (overlay)"
contexts = ["workspace"]
command = ["agent-tasks", "tui-overlay"]
